<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Outreach Autopilot{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-2: #1e1e1e;
            --border: #2a2a2a;
            --text: #f5f5f5;
            --text-muted: #888;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        nav {
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px);
            z-index: 100;
        }
        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
        }
        nav .logo span { color: var(--accent); }
        nav .links { display: flex; gap: 32px; }
        nav .links a { color: var(--text-muted); font-size: 14px; font-weight: 500; }
        nav .links a:hover { color: var(--text); }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
        }
        .btn-primary:hover { background: var(--accent-hover); color: #000; }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .badge-warning { background: rgba(245, 158, 11, 0.15); color: var(--accent); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        footer {
            border-top: 1px solid var(--border);
            padding: 40px 0;
            margin-top: 80px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            nav .links { gap: 16px; }
            .container { padding: 0 16px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Outreach<span>Autopilot</span></a>
            <div class="links">
                <a href="/">Portfolio</a>
                <a href="/dashboard">Dashboard</a>
                <a href="#how-it-works">How It Works</a>
                <a href="#pricing">Pricing</a>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer>
        <div class="container">
            <p>Built with AI. Powered by conviction.</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
